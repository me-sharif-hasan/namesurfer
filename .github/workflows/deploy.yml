name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Write .env on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_CONTENT: ${{ secrets.namesurfer_env }}
        with:
          host: ${{ secrets.namesurfer_host }}
          username: ${{ secrets.namesurfer_user }}
          key: ${{ secrets.namesurfer_ssh }}
          envs: ENV_CONTENT
          script: |
            printf '%s' "$ENV_CONTENT" | sudo tee /home/ubuntu/namesurfer/.env >/dev/null
            sudo chown ubuntu:ubuntu /home/ubuntu/namesurfer/.env
            sudo chmod 600 /home/ubuntu/namesurfer/.env

      - name: Pull, build and restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.namesurfer_host }}
          username: ${{ secrets.namesurfer_user }}
          key: ${{ secrets.namesurfer_ssh }}
          script_stop: true
          script: |
            cd /home/ubuntu/namesurfer
            sudo chown -R $(whoami):$(whoami) /home/ubuntu/namesurfer

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Installing dependencies"
            npm install --production=false

            echo "==> Building application"
            npm run build

            echo "==> Restarting systemd service"
            sudo systemctl restart opensubdomain

            echo "==> Verifying service status"
            sudo systemctl is-active opensubdomain
