name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Write .env.local on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_CONTENT: ${{ secrets.namesurfer_env }}
        with:
          host: ${{ secrets.namesurfer_host }}
          username: ${{ secrets.namesurfer_user }}
          key: ${{ secrets.namesurfer_ssh }}
          envs: ENV_CONTENT
          script: |
            printf '%s' "$ENV_CONTENT" | sudo tee /home/ubuntu/namesurfer/.env.local >/dev/null
            sudo chown ubuntu:ubuntu /home/ubuntu/namesurfer/.env.local
            sudo chmod 600 /home/ubuntu/namesurfer/.env.local

      - name: Pull, build and restart with PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.namesurfer_host }}
          username: ${{ secrets.namesurfer_user }}
          key: ${{ secrets.namesurfer_ssh }}
          script_stop: true
          script: |
            cd /home/ubuntu/namesurfer
            sudo chown -R $(whoami):$(whoami) /home/ubuntu/namesurfer

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Installing dependencies"
            npm install --production=false

            echo "==> Building application"
            npm run build

            echo "==> Ensuring PM2 is installed"
            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            echo "==> Starting or reloading PM2 process"
            if pm2 pid opensubdomain >/dev/null 2>&1; then
              pm2 reload opensubdomain --update-env
            else
              pm2 start npm --name "opensubdomain" -- start
            fi

            echo "==> Saving PM2 process list"
            pm2 save

            echo "==> Showing PM2 process status"
            pm2 show opensubdomain
